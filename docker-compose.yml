version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/documents:/app/documents
      - ./backend/chroma_db:/app/chroma_db
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finsight-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
